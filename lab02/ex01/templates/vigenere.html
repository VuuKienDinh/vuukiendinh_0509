<!DOCTYPE html>
<html lang="en">
<head>
    <title>Vigenere Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container">
        <table class="table">
            <tr><td style="text-align: center; font-weight: bold; font-size: 25px;">VIGENERE CIPHER</td></tr>
            
            <tr><td style="font-weight: bold; color: blue">ENCRYPTION</td></tr>
            <tr>
                <td>
                    <!-- action="/vigenere" thay vì /vigenere_encrypt -->
<!-- ENCRYPTION form -->
<form method="POST" action="/vigenere_encrypt">
    <div class="mb-3">
        <label class="form-label">Plain text:</label>
        <input type="text" class="form-control" name="text" placeholder="Input Plain Text" required autofocus/>
    </div>
    <div class="mb-3">
        <label class="form-label">Key:</label>
        <input type="text" class="form-control" name="key" placeholder="Input Key String" required/>
    </div>
    <button type="submit" class="btn btn-primary">Encrypt</button>
</form>

<!-- DECRYPTION form -->
<form method="POST" action="/vigenere_decrypt">
    <div class="mb-3">
        <label class="form-label">Cipher text:</label>
        <input type="text" class="form-control" name="text" placeholder="Input Cipher Text" required/>
    </div>
    <div class="mb-3">
        <label class="form-label">Key:</label>
        <input type="text" class="form-control" name="key" placeholder="Input Key String" required/>
    </div>
    <button type="submit" class="btn btn-success">Decrypt</button>
</form>
                </td>
            </tr>
        </table>

        {% if result %}
        <div class="alert alert-info mt-3">
            <strong>Kết quả {{ mode }}:</strong> <br>
            <span style="font-size: 20px; color: red;">{{ result }}</span>
        </div>
        {% endif %}
    </div>
</body>
</html>
